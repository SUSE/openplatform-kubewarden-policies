# Kubewarden Artifacthub Package config
#
# Use this config to submit the policy to https://artifacthub.io.
#
# This config can be saved to its default location with:
#   kwctl scaffold artifacthub > artifacthub-pkg.yml 
version: 0.1.1
name: pod-mig-partitions
displayName: Pod MIG Partitions
createdAt: 2026-03-03T14:44:03.739218887Z
description: Prevents assigning mig partitions without a ResourceQuota for them.
license: Apache-2.0
homeURL: https://github.com/SUSE/openplatform-kubewarden-policies
containersImages:
- name: policy
  image: ghcr.io/suse/openplatform-kubewarden-policies/rke2-mig-partitions:v0.1.1
keywords:
- pod
links:
- name: policy
  url: https://github.com/SUSE/openplatform-kubewarden-policies/tree/main/policies/pod-mig-partitions/releases/download/v0.1.1/policy.wasm
- name: source
  url: https://github.com/SUSE/openplatform-kubewarden-policies/tree/main/policies/pod-mig-partitions
install: |
  The policy can be obtained using [`kwctl`](https://github.com/kubewarden/kwctl):
  ```console
  kwctl pull ghcr.io/suse/openplatform-kubewarden-policies/rke2-mig-partitions:v0.1.1
  ```
  Then, generate the policy manifest and tune it to your liking. For example:
  ```console
  kwctl scaffold manifest -t ClusterAdmissionPolicy registry://ghcr.io/suse/openplatform-kubewarden-policies/rke2-mig-partitions:v0.1.1
  ```
maintainers:
- name: ITPE CORE Team
  email: itpe-core-maintenance@suse.com
provider:
  name: kubewarden
recommendations:
- url: https://artifacthub.io/packages/helm/kubewarden/kubewarden-controller
annotations:
  kubewarden/contextAwareResources: |
    - apiVersion: v1
      kind: ResourceQuota
  kubewarden/mutation: 'false'
  kubewarden/resources: Pod
  kubewarden/rules: |
    - apiGroups:
      - ''
      apiVersions:
      - v1
      resources:
      - pods
      operations:
      - CREATE
      - UPDATE
